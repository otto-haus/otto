<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme follows Settings → Display; boot script applies stored preference before paint. -->
    <meta name="color-scheme" content="light" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>otto Desktop</title>
    <style>
      #otto-boot-shell {
        box-sizing: border-box;
        min-height: 100vh;
        margin: 0;
        padding: 48px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: oklch(0.985 0.002 270);
        color: oklch(0.145 0.004 270);
        font: 500 14px/1.4 Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }
      #otto-boot-shell small {
        color: oklch(0.46 0.004 270);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var pref = 'light';
        try {
          if (window.otto && window.otto.boot && typeof window.otto.boot.displayTheme === 'function') {
            pref = window.otto.boot.displayTheme() || 'light';
          } else {
            var key = 'otto.display.theme.v1';
            var legacy = localStorage.getItem(key);
            if (legacy === 'light' || legacy === 'dark' || legacy === 'system') pref = legacy;
          }
        } catch (_) {}
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var effective = pref === 'dark' || (pref === 'system' && prefersDark) ? 'dark' : 'light';
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
        var meta = document.querySelector('meta[name="color-scheme"]');
        if (meta) meta.setAttribute('content', effective);
        var boot = document.getElementById('otto-boot-shell');
        if (boot && effective === 'dark') {
          boot.style.background = 'oklch(0.16 0.008 270)';
          boot.style.color = 'oklch(0.94 0.005 270)';
          var small = boot.querySelector('small');
          if (small) small.style.color = 'oklch(0.62 0.006 270)';
        }
      })();
    </script>
    <div id="root">
      <div id="otto-boot-shell" aria-live="polite">
        <strong>otto</strong>
        <small>Starting workspace…</small>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        const shell = document.getElementById('otto-boot-shell');
        if (!shell) return;
        shell.addEventListener('contextmenu', function (event) {
          event.preventDefault();
          const api = window.otto && window.otto.debug;
          if (api && api.showContextMenu) api.showContextMenu('boot');
        });
      })();
    </script>
  </body>
</html>
