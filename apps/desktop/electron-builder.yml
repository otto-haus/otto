appId: haus.otto.desktop
productName: otto
directories:
  output: dist-app
# Ship the built main/preload/renderer + the manifest. electron-builder also copies the
# production dependencies (the Letta SDK + its CLI) into the app.
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../../standards
    to: standards
  - from: ../../practices
    to: practices
  - from: ../../routines
    to: routines
  - from: ../../autonomy
    to: autonomy
# asar OFF on purpose: the Letta SDK spawns its CLI (`node …/letta.js`) as a subprocess,
# which is unreliable from inside an asar archive. Plain files keep the spawn working.
asar: false
mac:
  target:
    - dir
  category: public.app-category.developer-tools
  icon: build/icon.icns # the otto owl, generated from .github/assets/otto-avatar.png
  # Local/unsigned build — re-signed ad-hoc after packaging so it runs on Apple Silicon.
  identity: null
