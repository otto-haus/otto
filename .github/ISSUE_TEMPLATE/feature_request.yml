name: Feature request
description: Propose a capability or improvement for otto.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        otto is the behavior layer for persistent AI agents. A guiding principle from
        [CONTRIBUTING.md](https://github.com/otto-haus/otto/blob/main/CONTRIBUTING.md): **keep the core generic** —
        org-specific doctrine, gates, and templates belong in a separate private repo.
        Proposals that fit that frame are easiest to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction or gap are you hitting? Describe the situation, not just the fix.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like otto to do? A concrete sketch helps.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where would this live?
      options:
        - extension (Letta Code charter)
        - skill
        - desktop app
        - packages (core / practices)
        - docs
        - other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the core generic (no org-specific doctrine baked in).
          required: false
        - label: I'd be willing to help implement this.
          required: false
