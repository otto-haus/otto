name: Scheduled CI Drift

on:
  schedule:
    - cron: "17 10 * * 1"
  pull_request:
    branches: [main]
    paths:
      - ".bun-version"
      - ".github/workflows/scheduled-ci.yml"
      - "Taskfile.yml"
      - "bun.lock"
      - "package.json"
      - "scripts/ci-local-gate.sh"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scheduled-checks:
    name: scheduled-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure install did not rewrite the lockfile
        run: git diff --exit-code -- bun.lock

      - name: Run local CI gate
        run: bash scripts/ci-local-gate.sh
