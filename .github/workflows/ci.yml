name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Locate Bun cache
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache dir)" >> "$GITHUB_OUTPUT"
      - name: Cache Bun package store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.bun-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun ci
      - name: Ensure install did not rewrite the lockfile
        run: git diff --exit-code -- bun.lock
      - name: Run local CI gate
        run: bash scripts/ci-local-gate.sh

  embedded-letta-release-gate:
    name: embedded-letta-release-gate
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Locate Bun cache
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache dir)" >> "$GITHUB_OUTPUT"
      - name: Cache Bun package store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.bun-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun ci
      - name: Ensure install did not rewrite the lockfile
        run: git diff --exit-code -- bun.lock
      - name: Embedded Letta release gate (#678)
        run: bash scripts/ci-embedded-letta-gate.sh
      - name: Upload embedded-letta smoke receipt
        if: always()
        uses: actions/upload-artifact@ea165ad8906dd5b0e675b55f7c63f7fee663114b # v4.6.2
        with:
          name: embedded-letta-smoke-receipt
          path: ${{ runner.temp }}/otto-embedded-letta-receipts/
          if-no-files-found: ignore
