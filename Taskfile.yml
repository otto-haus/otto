version: '3'

# Otto dev tasks. Run `task` (or `task --list`) to see everything; `task <name>` to run one.
# go-task is installed (brew install go-task). Most tasks wrap the existing package scripts so
# there is one obvious command per job.

silent: true

vars:
  DESKTOP: apps/desktop
  OTTO_APP: /Applications/otto.app
  LETTA_CLI: /Applications/Letta.app/Contents/Resources/app.asar.unpacked/node_modules/@letta-ai/letta-code/letta.js

tasks:
  default:
    desc: List available tasks
    cmds: [task --list]

  install:
    aliases: [deps, bootstrap]
    desc: Install dependencies from bun.lock without rewriting it
    cmds: [bun install --frozen-lockfile]

  dev:
    desc: Desktop — web preview (Vite, http://localhost:5173)
    dir: '{{.DESKTOP}}'
    cmds: [bun run dev]

  electron:
    desc: Desktop — Electron dev app; chat connects only after Letta session initializes
    dir: '{{.DESKTOP}}'
    cmds:
      - node ../../scripts/ensure-electron-ready.mjs
      - |
        if [ -z "${OTTO_USER_DATA_DIR:-}" ]; then
          if [ -n "${OTTO_HOME:-}" ]; then
            export OTTO_USER_DATA_DIR="$OTTO_HOME/electron-user-data"
          elif [ -n "${XDG_STATE_HOME:-}" ]; then
            export OTTO_USER_DATA_DIR="$XDG_STATE_HOME/otto/electron-user-data"
          fi
        fi
        env -u ELECTRON_RUN_AS_NODE bun run electron:dev

  gen:
    desc: Regenerate file-backed data (practices.json, readiness.json)
    dir: '{{.DESKTOP}}'
    cmds:
      - bun run gen:practices
      - bun run gen:readiness

  typecheck:
    desc: Typecheck everything (core + practices + desktop renderer + electron)
    cmds:
      - bun run typecheck
      - bun run --cwd {{.DESKTOP}} typecheck
      - bun run --cwd {{.DESKTOP}} electron:typecheck

  test:
    desc: Unit tests
    cmds: [bun test]

  verify:
    desc: v0 release gate (scripts/verify-v0.mjs)
    cmds: [bun run verify:v0]

  docs:dev:
    desc: DevEx docs preview (Mintlify)
    cmds: [bun run docs:dev]

  docs:validate:
    desc: Validate DevEx docs (Mintlify)
    cmds: [bun run docs:validate]

  docs:links:
    desc: Check DevEx docs links (Mintlify)
    cmds: [bun run docs:links]

  build:
    desc: Build the desktop app with committed readiness baseline (main + preload + renderer)
    dir: '{{.DESKTOP}}'
    env:
      OTTO_READINESS_IGNORE_LOCAL_CONFIG: '1'
    cmds: [bun run electron:build]

  package:
    desc: Package the macOS .app (electron-builder, arm64)
    dir: '{{.DESKTOP}}'
    env:
      OTTO_READINESS_IGNORE_LOCAL_CONFIG: '1'
    cmds:
      - bun run electron:build
      - bunx electron-builder --mac dir --arm64

  install:release:
    desc: Canonical live install — latest GitHub Release desktop artifact to /Applications/otto.app (requires OTTO_ALLOW_RELEASE_INSTALL=1)
    cmds: [bash scripts/install-otto-release.sh]

  smoke:release:metadata:
    desc: Read-only check — compare installed otto.app metadata to latest GitHub Release (never mutates otto.app)
    cmds:
      - node scripts/otto-release-metadata-check.mjs

  refresh:
    desc: BLOCKED — use `task install:release` (GitHub Release) or `task staging` (candidate/dev)
    cmds:
      - |
        echo "task refresh no longer installs local branch builds into /Applications/otto.app." >&2
        echo "  OTTO_ALLOW_RELEASE_INSTALL=1 task install:release" >&2
        echo "  task staging" >&2
        exit 2

  refresh:local:
    aliases: [refresh:live]
    desc: Sebastian-only local branch build into otto.app — requires OTTO_ALLOW_LOCAL_LIVE_BUILD=1 and OTTO_ALLOW_LIVE_REFRESH=1
    cmds:
      - task: _refresh-live

  staging:
    aliases: [deploy]
    desc: Safe deploy — build + package + install/open isolated /Applications/otto-staging.app
    cmds: [bash apps/desktop/scripts/deploy-staging.sh]

  staging:main:
    desc: Fetch origin/main and refresh /Applications/otto-staging.app with visible source markers (#338)
    cmds: [bash scripts/staging-refresh-from-main.sh]

  smoke:staging:source-marker:
    desc: Playwright smoke — staging channel/commit/profile source marker (#321/#338)
    cmds:
      - node scripts/otto-staging-source-marker-smoke.cjs

  _refresh-live:
    internal: true
    preconditions:
      - sh: 'test "${OTTO_ALLOW_LIVE_REFRESH:-}" = "1"'
        msg: 'Refusing local live build. Use `OTTO_ALLOW_RELEASE_INSTALL=1 task install:release`, or Sebastian-only `OTTO_ALLOW_LOCAL_LIVE_BUILD=1 OTTO_ALLOW_LIVE_REFRESH=1 task refresh:local`.'
      - sh: 'test "${OTTO_ALLOW_LOCAL_LIVE_BUILD:-}" = "1"'
        msg: 'Local branch builds cannot replace otto.app without OTTO_ALLOW_LOCAL_LIVE_BUILD=1. Canonical path: OTTO_ALLOW_RELEASE_INSTALL=1 task install:release'
    cmds: [bash scripts/refresh-otto-app.sh]

  open:
    desc: Open installed /Applications/otto.app without the Electron-as-Node footgun
    cmds:
      - env -u ELECTRON_RUN_AS_NODE open {{.OTTO_APP}}

  quit:
    desc: Quit installed otto app
    cmds:
      - osascript -e 'tell application "otto" to quit' >/dev/null 2>&1 || true
      - pkill -f '/Applications/otto.app/Contents/MacOS/otto' 2>/dev/null || true

  ps:
    desc: Show live otto + spawned Letta CLI processes
    cmds:
      - ps aux | grep -E '[M]acOS/otto|[o]tto Helper|[l]etta-code/letta.js --output-format stream-json' | sed -n '1,160p'

  smoke:cli:
    desc: Optional Letta CLI smoke; requires OTTO_AGENT_ID or LETTA_AGENT_ID and uses a disposable conversation
    cmds:
      - |
        AGENT_ID="${OTTO_AGENT_ID:-${LETTA_AGENT_ID:-}}"
        if [ -z "$AGENT_ID" ]; then
          printf '%s\n' 'SKIP task smoke:cli: OTTO_AGENT_ID or LETTA_AGENT_ID is not set.'
          printf '%s\n' 'Run OTTO_AGENT_ID=<agent-id> (or LETTA_AGENT_ID=<agent-id>) task smoke:cli after you have a real local Letta agent.'
          exit 0
        fi
        CLI_PATH="${LETTA_CLI_PATH:-{{.LETTA_CLI}}}"
        if [ ! -f "$CLI_PATH" ]; then
          printf '%s\n' "Letta CLI not found at $CLI_PATH"
          printf '%s\n' 'Install or repair Letta Desktop / Letta Code, or set LETTA_CLI_PATH=/path/to/letta.js.'
          exit 1
        fi
        node "$CLI_PATH" --agent "$AGENT_ID" --new --no-memfs --no-skills --no-system-info-reminder -p 'Reply exactly: OTTO_SMOKE_OK' --output-format json

  smoke:cron:
    desc: Optional Letta cron smoke — disposable conversation; create/list/delete reminder task (#296)
    cmds: [bash scripts/letta-cron-disposable-smoke.sh]

  smoke:desktop:
    desc: Non-destructive desktop smoke — launches a temporary second instance, leaves live otto.app alone
    cmds:
      - |
        bash -lc 'set -euo pipefail
        SMOKE_DATA="$(mktemp -d /tmp/otto-smoke-data.XXXXXX)"
        SMOKE_CONFIG="$(mktemp -d /tmp/otto-smoke-config.XXXXXX)"
        OTTO_SMOKE=1 OTTO_CONFIG_DIR="$SMOKE_CONFIG" env -u ELECTRON_RUN_AS_NODE {{.OTTO_APP}}/Contents/MacOS/otto --user-data-dir="$SMOKE_DATA" >/tmp/otto_desktop_smoke.log 2>&1 &
        SMOKE_PID="$!"
        sleep 3
        ps -p "$SMOKE_PID" >/dev/null
        ps -p "$SMOKE_PID" -o pid=,command=
        /bin/kill "$SMOKE_PID" >/dev/null 2>&1 || true
        pkill -P "$SMOKE_PID" >/dev/null 2>&1 || true
        pkill -f "letta.js --output-format stream-json --input-format stream-json --agent .* --new" >/dev/null 2>&1 || true'

  smoke:desktop:live:
    desc: DANGEROUS — quits/reopens the live installed app; use only when Sebastian is not chatting in it
    cmds:
      - task: quit
      - |
        OTTO_SMOKE=1 env -u ELECTRON_RUN_AS_NODE {{.OTTO_APP}}/Contents/MacOS/otto >/tmp/otto_desktop_smoke_live.log 2>&1 &
      - sleep 3
      - pgrep -f '/Applications/otto.app/Contents/MacOS/otto' >/dev/null
      - task: ps

  lint:
    desc: Lint with Biome (no install — via bunx)
    cmds:
      - bunx --bun @biomejs/biome@1.9.4 lint {{.DESKTOP}}/src {{.DESKTOP}}/electron packages

  lint:workflows:
    desc: Lint GitHub Actions workflows (actionlint, YAML parse fallback)
    cmds: [bash scripts/lint-workflows.sh]

  format:
    desc: Format with Biome (writes changes)
    cmds:
      - bunx --bun @biomejs/biome@1.9.4 format --write {{.DESKTOP}}/src {{.DESKTOP}}/electron packages

  check:
    aliases: [ci]
    desc: Full local CI gate — mirrors .github/workflows/ci.yml
    cmds:
      - bash scripts/ci-local-gate.sh

  release:gate:
    desc: Pre-release gate — lint + checks + tests + electron build + regression guards
    cmds: [bun run release:gate]

  clean:
    desc: Remove build artifacts (out/, dist/, dist-app/)
    cmds:
      - rm -rf {{.DESKTOP}}/out {{.DESKTOP}}/dist {{.DESKTOP}}/dist-app
