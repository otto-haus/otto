# Conforms to Routine in packages/core/src/types.ts
id: routine_charter_checkin_v0
slug: charter-checkin
name: Charter Check-in Routine
status: proposed
summary: Prevent long-running Charter work from going stale by surfacing stale goals, blockers, and next steps.
steps:
  - practice: charter
    invocation: /charter status
    inputs:
      include_active_charters: true
  - practice: review
    invocation: /review stale-charters
    inputs:
      focus: no recent receipts, unmapped acceptance criteria, and blockers
  - practice: charter
    invocation: /charter block
    inputs:
      mode: draft-only if a blocker needs to be recorded
schedule:
  cron: "0 9 * * 1,3"
  timezone: America/Los_Angeles
attention_cost: low
requires_approval_to_activate: true
created_at: "2026-06-13T00:00:00Z"
