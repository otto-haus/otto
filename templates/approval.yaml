# A first-class, scoped, time-bound approval record for a one-way door.
# Only act on an approval that is `approved`, unexpired, and within `scope`.
id: <short-id>
requested_action: <exact action, e.g. "create public GitHub repo example-org/otto and push main">
scope: <narrowly what this covers>
evidence_required: <proof needed before/after, e.g. "local commit exists; license confirmed">
requested_at: <iso8601>
expires_at: <iso8601>
status: pending           # pending | approved | denied | expired
decided_by: <name>
decided_at: <iso8601>
